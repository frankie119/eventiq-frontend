<div class="container d-flex justify-content-center mt-5 mb-5">
  <div class="card p-4 shadow-sm" style="width: 450px;">
    
    <div class="text-center mb-4">
      <img src = "Logo1.png" alt="Eventiq logo" class="hero-logo">
    </div>

    <h3 class="mb-4">Register</h3>
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
      
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" class="form-control" formControlName="full_name" placeholder="John Doe">
      </div>
      
      <div class="mb-3">
        <label class="form-label">E-Mail Address</label>
        <input type="email" class="form-control" formControlName="username" placeholder="name@example.com">
      </div>
      
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" class="form-control" formControlName="password" placeholder="Min. 6 characters">
      </div>

      <div class="mb-4 mt-4 p-3 bg-light rounded border">
        <label class="form-label fw-bold text-primary mb-3">
          <i class="bi bi-stars"></i> What are you interested in?
        </label>
        <div class="row">
          <div *ngFor="let cat of categories" class="col-6 mb-2">
            <div class="form-check">
              <input class="form-check-input" 
                     type="checkbox" 
                     [id]="cat" 
                     (change)="onInterestChange(cat, $event)">
              <label class="form-check-label text-capitalize" [for]="cat" style="cursor: pointer;">
                {{ cat }}
              </label>
            </div>
          </div>
        </div>
      </div>

      <button type="submit" class="btn btn-primary w-100 fw-bold" [disabled]="registerForm.invalid">
        Register
      </button>
      
      <div class="mt-3 text-center">
        <small class="text-muted">Already have an account? <a routerLink="/login" class="text-decoration-none fw-bold">Login</a></small>
      </div>
      
      <div *ngIf="errorMessage" class="alert alert-danger mt-3 py-2 text-center">{{ errorMessage }}</div>
      <div *ngIf="successMessage" class="alert alert-success mt-3 py-2 text-center">{{ successMessage }}</div>

    </form>
  </div>
</div>
