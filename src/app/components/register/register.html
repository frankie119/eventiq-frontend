<section class="h-100 my-login-page mt-5">
  <div class="container h-100">
    <div class="row justify-content-center h-100">
      <div class="card-wrapper">
        <div class="text-center mb-4">
          <div class="brand">
            <img src = "Logo1.png" alt="Eventiq logo" class="hero-logo">
          </div>
        </div>
        
        <div class="card shadow-sm border-0 fat">
          <div class="card-body">
            <h4 class="card-title fw-bold mb-4">Register</h4>
            
            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()">
              
              <div class="form-group mb-3">
                <label for="full_name">Full Name</label>
                <input id="full_name" type="text" class="form-control" formControlName="full_name">
              </div>

              <div class="form-group mb-3">
                <label for="username">E-Mail Address</label>
                <input id="username" type="email" class="form-control" formControlName="username">
              </div>

              <div class="form-group mb-4">
                <label for="password">Password</label>
                <input id="password" type="password" class="form-control" formControlName="password">
              </div>
              
              <div class="alert alert-danger py-2" *ngIf="errorMessage">{{ errorMessage }}</div>
              <div class="alert alert-success py-2" *ngIf="successMessage">{{ successMessage }}</div>

              <div class="form-group m-0 mt-4">
                <button type="submit" class="btn btn-primary btn-block fw-bold" [disabled]="registerForm.invalid">
                  Register
                </button>
              </div>

              <div class="mt-4 text-center">
                Already have an account? <a routerLink="/login">Login</a>
              </div>
            </form>
          </div>
        </div>

        <div class="footer text-center mt-4 text-muted small">
          Copyright &copy; 2026 &mdash; Eventiq 
        </div>
      </div>
    </div>
  </div>
</section>
