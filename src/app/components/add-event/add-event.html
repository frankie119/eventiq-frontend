<div>
  <form [formGroup]="eventForm" (ngSubmit)="onSubmit()">
    
    <div class="form-group">
      <label for="title">Title</label>
      <input type="text" id="title" formControlName="title">
    </div>

    <div class="form-group">
      <label for="category">Category</label>
      <input type="text" id="category" formControlName="category">
    </div>

    <div class="form-group">
      <label for="venue">Venue</label>
      <input type="text" id="venue" formControlName="venue">
    </div>

    <div class="form-group">
      <label for="date">Date</label>
      <input type="date" id="date" formControlName="date">
    </div>

    <div class="form-group">
      <label for="price">Price</label>
      <input type="number" id="price" formControlName="price">
    </div>

    <div class="form-group">
      <label for="total_tickets">Total Tickets</label>
      <input type="number" id="total_tickets" formControlName="total_tickets">
    </div>
    <div class="form-group">
        <label for="eventImage">Event Image</label>
        <input type="file" id="eventImage" accept="image/*" (change)="onFileSelect($event)">
    </div>

    <button type="submit" class="submitButton">Submit</button>
    
  </form>
</div>
