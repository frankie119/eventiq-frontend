<div class="hero-section text-center">
  <img src = "Logo1.png" alt="Eventiq logo" class="hero-logo">
  <h1 class="text-white fw-bold">Smarter Event Planning</h1>
  <p class="text-light mb-0">Powered reccomendations with lasting memories </p>
</div>

<div class="container mt-5">
  <h2 class="mb-4"> Trending Now</h2>
  
  <div class="row">
    <div class="col-md-4 mb-4" *ngFor="let event of trending_events">
      <div class="card h-100 shadow-sm">
        <div class="card-body">
          <h5 class="card-title">{{ event.title }}</h5>
          <h6 class="card-subtitle mb-2 text-muted">{{ event.date }}</h6>
          <p class="card-text">
            <strong>Venue:</strong> {{ event.venue }}<br>
            <strong>Price:</strong> £{{ event.price }}
          </p>
          <a [routerLink]="['/events', event._id]" class="btn btn-outline-primary btn-sm">View Details</a>
        </div>
      </div>
    </div>
  </div>

  <div *ngIf="trending_events.length === 0" class="text-center text-muted">
    <p>Loading trending events...</p>
  </div>
</div>
