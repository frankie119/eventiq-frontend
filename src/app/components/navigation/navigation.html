<nav class="navbar navbar-expand-lg navbar-dark bg-dark ">
  <div class="container">
    
    <a class="navbar-brand" routerLink="/">
      Eventiq
    </a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="navbarNav">
      
      <ul class="navbar-nav me-auto">
        <li class="nav-item">
          <a class="nav-link" routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{exact: true}">Home</a>
        </li>
        <li class="nav-item">
          <a class="nav-link" routerLink="/events" routerLinkActive="active">Events</a>
        </li>

        <li class="nav-item" *ngIf="authService.isAuthenticated$ | async">
          <a class="nav-link" routerLink="/add-event" routerLinkActive="active">Add Event</a>
        </li>
      </ul>

      <ul class="navbar-nav ms-auto">
        
        <ng-container *ngIf="authService.isAuthenticated$ | async; else loggedOut">
          <li class="nav-item">
            <button class="btn btn-light" 
                    (click)="authService.logout({ logoutParams: { returnTo: document.location.origin } })">
              Log out
            </button>
          </li>
        </ng-container>

        <ng-template #loggedOut>
          <li class="nav-item">
            <button class="btn btn-light" (click)="authService.loginWithRedirect()">
              Log in
            </button>
          </li>
        </ng-template>

      </ul>
      
    </div>
  </div>
</nav>
